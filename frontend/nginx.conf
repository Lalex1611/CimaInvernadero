server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Sirve el SPA de React; cualquier ruta desconocida cae en index.html
    # (necesario para que funcione el ruteo del lado del cliente, ej. react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reenvía las llamadas a /api hacia el contenedor del backend.
    # Así el frontend puede llamar a rutas relativas como "/api/lecturas"
    # sin preocuparse por CORS ni por la URL pública del backend.
    location /api {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /uploads {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
}
}
